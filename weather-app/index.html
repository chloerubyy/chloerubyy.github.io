<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiny Project 12: Weather App 2.0</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
</head>

<body>

    <div id="modalCover"></div>
    <div id="modalForm">
        <form id="locationForm">
            <input type="text" id="locationBox">
            <button type="Submit">Get Weather</button>
        </form>
    </div>

    <button id="findLocation">New Location</button>

    <main>

        <div id="currentInfo">
            <h1 id="tpTitle">Tiny Project 12: Layout for Weather App 2.0</h1>
            <div id="currentLocation"></div>
            <div id="currentTemp"><span></span>°F</div>
            <div id="currentStatus"></div>
        </div>

        <div id="topRight">

            <div id="currentHumidity"><span></span>%</div>

            <div id="currentWind">
                Wind: 6 mph <span class="windArrow">➤</span> E
            </div>
        </div>

        <div id="futureInfo">
            <div class="futureDay">
                <div class="dayName">Monday</div>
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind">1-6 mph</div>
                <div class="futureStatus"></div>
            </div>

            <div class="futureDay">
                <div class="dayName">Tuesday</div>
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind">2-5 mph</div>
                <div class="futureStatus">
                    <img src="images/cloudy.png" alt="Cloudy" class="weatherIcon">
                    Cloudy
                </div>
            </div>

            <div class="futureDay">
                <div class="dayName">Wednesday</div>
                <div class="futureTemp"><span></span>°F</div>
                <div class="futureWind">3-6 mph</div>
                <div class="futureStatus">
                    <img src="images/cloudy.png" alt="Cloudy" class="weatherIcon">
                    Cloudy
                </div>
            </div>
        </div>

    </main>
</body>

</html>
